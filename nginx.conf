# Секция глобальных настроек
events {
    worker_connections 1024; # Максимальное число одновременных соединений
}

http {
    # Подключаем MIME-типы, чтобы браузер понимал, что CSS — это CSS
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Определяем, где живет наш бэкенд (имя 'backend' берется из docker-compose)
    upstream backend_nodes {
        server backend:8080; # 8080 — порт, на котором слушает твой Python-сервер
    }

    server {
        listen 80;
        server_name localhost;

        # 1. РАЗДАЧА СТАТИКИ
        # Все запросы, начинающиеся на /static/, Nginx закроет сам
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 30d; # Кешируем стили на стороне клиента для скорости
            add_header Cache-Control "public";
        }

        # 2. ПРОКСИРОВАНИЕ ДИНАМИКИ
        # Все остальные запросы (HTML-страницы) отправляем в Python
        location / {
            proxy_pass http://backend_nodes;

            # Передаем реальные заголовки, чтобы Python знал IP пользователя
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Таймауты (важно, если БД долго думает)
            proxy_read_timeout 90;
            proxy_connect_timeout 90;
        }

        # Кастомная страница ошибки (опционально)
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}